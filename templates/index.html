<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Saba Coffee - ሳባ ቡና | ምግብ ዝርዝር</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Ethiopic:wght@400;600;700;800&family=Noto+Sans+Ethiopic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --orange:#E8672B;
    --orange-dark:#C94E1B;
    --orange-light:#F4914F;
    --gold:#D9A441;
    --coffee:#3D2015;
    --coffee-soft:#5A3826;
    --cream:#FFF8F0;
    --plate:#FFFFFF;
    --ink:#3D2015;
    --muted:#9A7E6E;
    --shadow: 0 2px 12px rgba(61,32,21,0.10);
    --radius: 20px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Noto Sans Ethiopic','Noto Sans',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .brand-font{font-family:'Noto Serif Ethiopic','Noto Sans Ethiopic',serif;}

  /* ---------- background texture ---------- */
  .bg-rings{
    position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
  }
  .bg-rings span{
    position:absolute; border-radius:50%; border:2px solid rgba(232,103,43,0.06);
  }

  /* ---------- header ---------- */
  header.top{
    position:relative; z-index:2;
    background:linear-gradient(160deg, var(--orange) 0%, var(--orange-dark) 55%, var(--coffee) 130%);
    padding:26px 20px 22px;
    border-radius:0 0 28px 28px;
    box-shadow:0 6px 24px rgba(61,32,21,0.22);
    overflow:hidden;
  }
  .header-inner{
    position:relative; z-index:2;
    display:flex; align-items:center; gap:14px; max-width:640px; margin:0 auto;
  }
  .jebena{ width:52px; height:52px; flex-shrink:0; opacity:0.95; }
  .brand-text h1{
    margin:0; color:#fff; font-size:22px; line-height:1.25; font-weight:700;
    letter-spacing:0.2px;
  }
  .brand-text .sub-en{
    display:block; font-family:'Noto Sans Ethiopic',sans-serif; font-size:11px; font-weight:500;
    letter-spacing:2.5px; text-transform:uppercase; color:rgba(255,255,255,0.75); margin-top:2px;
  }
  .brand-text .tagline{
    margin:6px 0 0; color:rgba(255,255,255,0.88); font-size:13px; font-weight:500;
  }
  .steam{
    position:absolute; right:-10px; top:-20px; width:140px; height:140px; opacity:0.10;
  }

  /* ---------- category chips ---------- */
  .cat-nav-wrap{ position: sticky; top:0; z-index:5; background:var(--cream); padding:14px 0 6px; }
  .cat-nav{
    display:flex; gap:10px; overflow-x:auto; padding:4px 20px 10px;
    scrollbar-width:none; max-width:640px; margin:0 auto;
  }
  .cat-nav::-webkit-scrollbar{display:none;}
  .cat-chip{
    flex-shrink:0; padding:10px 18px; border-radius:999px; border:2px solid rgba(232,103,43,0.18);
    background:#fff; color:var(--orange-dark); font-weight:600; font-size:14px; cursor:pointer;
    white-space:nowrap; transition:all .18s ease; font-family:'Noto Sans Ethiopic',sans-serif;
  }
  .cat-chip:hover{ border-color: var(--orange); }
  .cat-chip.active{
    background:linear-gradient(135deg, var(--orange), var(--orange-dark));
    color:#fff; border-color:transparent; box-shadow:0 6px 16px rgba(232,103,43,0.35);
  }

  /* ---------- main / grid ---------- */
  main{ position:relative; z-index:1; max-width:640px; margin:0 auto; padding:8px 16px 60px; }
  .cat-heading{
    display:flex; align-items:baseline; gap:10px; margin:18px 4px 14px;
  }
  .cat-heading h2{ margin:0; font-size:19px; font-weight:700; }
  .cat-heading .count{ font-size:12px; color:var(--muted); font-weight:500; }

  .grid{ display:grid; grid-template-columns:1fr; gap:14px; }
  @media(min-width:520px){ .grid{ grid-template-columns:1fr 1fr; } }

  .item-card{
    position:relative; background:var(--plate); border-radius:var(--radius);
    padding:18px 16px 16px; box-shadow:var(--shadow);
    display:flex; gap:12px; align-items:flex-start; overflow:hidden;
    animation:riseIn .35s ease both;
  }
  .item-card::before{
    content:""; position:absolute; top:0; left:0; right:0; height:5px;
    background:linear-gradient(90deg, var(--gold), var(--orange) 45%, var(--gold));
  }
  .item-card::after{
    content:""; position:absolute; inset:9px; border-radius:14px;
    border:1px dashed rgba(232,103,43,0.14); pointer-events:none;
  }
  @keyframes riseIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

  .item-icon{
    width:46px; height:46px; border-radius:50%; flex-shrink:0;
    background:radial-gradient(circle at 32% 28%, #FFF3E4, var(--cream));
    box-shadow:inset 0 0 0 2px rgba(232,103,43,0.20);
    display:flex; align-items:center; justify-content:center; font-size:22px;
  }
  .item-body{ flex:1; min-width:0; }
  .item-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
  .item-name{ font-weight:700; font-size:15.5px; line-height:1.3; }
  .item-name-en{ display:block; font-size:11.5px; color:var(--muted); font-weight:500; margin-top:1px; }
  .item-desc{ font-size:12.5px; color:var(--muted); margin-top:6px; line-height:1.5; }
  .price-pill{
    flex-shrink:0; background:linear-gradient(135deg, var(--orange), var(--orange-dark));
    color:#fff; padding:6px 13px; border-radius:999px; font-weight:700; font-size:13px;
    white-space:nowrap; box-shadow:0 3px 8px rgba(232,103,43,0.3);
  }
  .unavailable-badge{
    display:inline-block; margin-top:8px; font-size:11px; font-weight:700; color:#B23A2B;
    background:#FBE3DD; padding:3px 9px; border-radius:999px;
  }
  .item-card.is-unavailable{ opacity:0.55; }

  .empty-state{
    text-align:center; padding:50px 20px; color:var(--muted);
  }
  .empty-state .emoji{ font-size:38px; display:block; margin-bottom:10px; }

  /* ---------- footer ---------- */
  footer{
    position:relative; z-index:1; background:var(--coffee); color:#fff;
    text-align:center; padding:34px 20px 26px; margin-top:20px;
    border-radius:28px 28px 0 0;
  }
  footer .foot-brand{ font-size:20px; font-weight:700; letter-spacing:0.5px; }
  footer .foot-sub{ font-size:12px; color:rgba(255,255,255,0.55); margin-top:8px; letter-spacing:1px; }

  /* ---------- admin trigger ---------- */
  .admin-fab{
    position:fixed; right:16px; bottom:16px; z-index:20;
    width:46px; height:46px; border-radius:50%; border:none; cursor:pointer;
    background:var(--coffee); color:#fff; box-shadow:0 6px 18px rgba(61,32,21,0.35);
    display:flex; align-items:center; justify-content:center; font-size:19px;
    transition:transform .15s ease;
  }
  .admin-fab:hover{ transform:scale(1.06); }

  /* ---------- cart trigger ---------- */
  .cart-fab{
    position:fixed; left:16px; bottom:16px; z-index:20;
    min-width:46px; height:46px; border-radius:999px; border:none; cursor:pointer;
    background:linear-gradient(135deg, var(--orange), var(--orange-dark)); color:#fff;
    box-shadow:0 6px 18px rgba(232,103,43,0.4);
    display:flex; align-items:center; justify-content:center; gap:6px; font-size:19px;
    padding:0 16px 0 14px; transition:transform .15s ease;
  }
  .cart-fab:hover{ transform:scale(1.05); }
  .cart-fab .cart-total{ font-size:13px; font-weight:700; font-family:'Noto Sans Ethiopic',sans-serif; }
  .cart-fab .cart-badge{
    position:absolute; top:-6px; right:-6px; background:var(--coffee); color:#fff;
    min-width:20px; height:20px; padding:0 4px; border-radius:999px; font-size:11px; font-weight:800;
    display:flex; align-items:center; justify-content:center; box-shadow:0 2px 6px rgba(0,0,0,0.3);
  }
  .cart-fab.is-empty{ display:none; }

  /* ---------- add-to-cart on item card ---------- */
  .item-actions{ display:flex; align-items:center; justify-content:flex-end; margin-top:10px; }
  .add-cart-btn{
    border:none; border-radius:999px; background:var(--coffee); color:#fff; cursor:pointer;
    font-size:12.5px; font-weight:700; padding:7px 14px; display:flex; align-items:center; gap:5px;
    font-family:'Noto Sans Ethiopic',sans-serif; transition:opacity .15s ease;
  }
  .add-cart-btn:hover{ opacity:0.88; }
  .qty-stepper{ display:flex; align-items:center; gap:10px; background:#FBEFE4; border-radius:999px; padding:4px 6px; }
  .qty-stepper button{
    width:26px; height:26px; border-radius:50%; border:none; cursor:pointer; background:var(--orange);
    color:#fff; font-size:15px; font-weight:700; display:flex; align-items:center; justify-content:center; line-height:1;
  }
  .qty-stepper span{ min-width:16px; text-align:center; font-weight:700; font-size:13.5px; }

  /* ---------- cart / checkout modal ---------- */
  .cart-line{
    display:flex; align-items:center; gap:10px; background:#fff; border-radius:14px; padding:10px 12px;
    margin-bottom:10px; box-shadow:var(--shadow);
  }
  .cart-line .item-icon{ width:38px; height:38px; font-size:18px; }
  .cart-line-body{ flex:1; min-width:0; }
  .cart-line-name{ font-weight:700; font-size:14px; }
  .cart-line-price{ font-size:12px; color:var(--muted); margin-top:2px; }
  .cart-line-remove{
    background:none; border:none; color:#B23A2B; font-size:16px; cursor:pointer; padding:4px; flex-shrink:0;
  }
  .cart-summary{
    display:flex; justify-content:space-between; align-items:center; font-weight:700; font-size:15.5px;
    padding:14px 4px 4px; border-top:2px dashed rgba(232,103,43,0.2); margin-top:8px;
  }
  .cart-empty{ text-align:center; color:var(--muted); padding:40px 10px; }
  .cart-empty .emoji{ font-size:36px; display:block; margin-bottom:10px; }
  .order-success{ text-align:center; padding:30px 10px; }
  .order-success .emoji{ font-size:44px; display:block; margin-bottom:12px; }
  .order-success h4{ margin:0 0 6px; font-size:17px; }
  .order-success p{ color:var(--muted); font-size:13.5px; margin:0 0 4px; }

  /* ---------- orders admin ---------- */
  .order-card{
    background:#fff; border-radius:16px; padding:14px; margin-bottom:12px; box-shadow:var(--shadow);
    border-left:4px solid var(--orange);
  }
  .order-card.is-done{ border-left-color:#8fae7a; opacity:0.72; }
  .order-card-head{ display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
  .order-card-name{ font-weight:700; font-size:14.5px; }
  .order-card-phone{ font-size:12.5px; color:var(--muted); margin-top:2px; }
  .order-card-time{ font-size:11px; color:var(--muted); white-space:nowrap; }
  .order-card-items{ font-size:12.5px; margin:10px 0; color:var(--ink); line-height:1.6; }
  .order-status-pill{
    font-size:10.5px; font-weight:800; padding:3px 9px; border-radius:999px; text-transform:uppercase;
    letter-spacing:0.5px; background:#FBE3DD; color:#B23A2B;
  }
  .order-status-pill.done{ background:#E7F0DF; color:#4E6B3A; }
  .order-card-foot{ display:flex; justify-content:space-between; align-items:center; margin-top:10px; }
  .order-card-total{ font-weight:700; font-size:14px; color:var(--orange-dark); }
  .order-card-actions{ display:flex; gap:6px; }

  /* ---------- modal ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(61,32,21,0.55); z-index:50;
    display:flex; align-items:flex-end; justify-content:center;
    animation:fadeIn .18s ease both;
  }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  @media(min-width:640px){ .modal-overlay{ align-items:center; } }

  .modal{
    background:var(--cream); width:100%; max-width:640px; max-height:92vh; overflow-y:auto;
    border-radius:24px 24px 0 0; padding:0;
    animation:slideUp .22s ease both;
  }
  @media(min-width:640px){ .modal{ border-radius:24px; max-height:85vh; } }
  @keyframes slideUp{ from{transform:translateY(24px); opacity:0;} to{transform:translateY(0); opacity:1;} }

  .modal-head{
    position:sticky; top:0; background:var(--coffee); color:#fff; padding:18px 20px;
    display:flex; align-items:center; justify-content:space-between; z-index:2;
  }
  .modal-head h3{ margin:0; font-size:17px; font-weight:700; }
  .icon-btn{
    background:rgba(255,255,255,0.14); border:none; color:#fff; width:32px; height:32px;
    border-radius:50%; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center;
  }
  .modal-body{ padding:20px; }

  .pin-screen{ text-align:center; padding:30px 10px; }
  .pin-screen .lock-emoji{ font-size:40px; }
  .pin-screen p{ color:var(--muted); font-size:13.5px; margin:8px 0 20px; }
  .pin-input{
    width:100%; max-width:220px; text-align:center; font-size:22px; letter-spacing:8px;
    padding:12px; border-radius:14px; border:2px solid rgba(232,103,43,0.25); outline:none;
    font-weight:700; color:var(--ink); background:#fff;
  }
  .pin-input:focus{ border-color:var(--orange); }
  .pin-error{ color:#B23A2B; font-size:12.5px; margin-top:8px; min-height:16px; }

  .btn{
    border:none; border-radius:12px; padding:11px 18px; font-weight:700; font-size:14px;
    cursor:pointer; font-family:'Noto Sans Ethiopic',sans-serif; transition:opacity .15s ease;
  }
  .btn:hover{ opacity:0.9; }
  .btn-primary{ background:linear-gradient(135deg, var(--orange), var(--orange-dark)); color:#fff; }
  .btn-outline{ background:#fff; color:var(--orange-dark); border:2px solid rgba(232,103,43,0.25); }
  .btn-danger{ background:#FBE3DD; color:#B23A2B; }
  .btn-block{ width:100%; margin-top:14px; }
  .btn-sm{ padding:7px 12px; font-size:12.5px; border-radius:9px; }

  .admin-tabs{ display:flex; gap:8px; margin-bottom:18px; }
  .admin-tab{
    flex:1; text-align:center; padding:10px; border-radius:12px; border:2px solid rgba(232,103,43,0.15);
    background:#fff; color:var(--muted); font-weight:700; font-size:13.5px; cursor:pointer;
  }
  .admin-tab.active{ background:var(--orange); color:#fff; border-color:transparent; }

  .admin-card{
    background:#fff; border-radius:16px; padding:14px; margin-bottom:12px; box-shadow:var(--shadow);
  }
  .field-row{ display:flex; gap:8px; margin-bottom:8px; }
  .field-row input, .field-row select, .field-row textarea{
    width:100%; padding:9px 11px; border-radius:10px; border:1.5px solid rgba(232,103,43,0.20);
    font-size:13.5px; font-family:'Noto Sans Ethiopic',sans-serif; color:var(--ink); outline:none; background:#FFFDFB;
  }
  .field-row input:focus, .field-row select:focus, .field-row textarea:focus{ border-color:var(--orange); }
  label.field-label{ font-size:11px; color:var(--muted); font-weight:700; display:block; margin-bottom:4px; }
  .field-group{ flex:1; min-width:0; }

  .admin-item-row{ display:flex; justify-content:space-between; align-items:center; gap:10px; }
  .admin-item-actions{ display:flex; gap:6px; flex-shrink:0; }
  .avail-toggle{
    display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); font-weight:600; cursor:pointer;
  }
  .avail-toggle input{ accent-color: var(--orange); width:16px; height:16px; }

  .section-title{ font-size:13px; font-weight:700; color:var(--coffee-soft); margin:18px 4px 10px; text-transform:uppercase; letter-spacing:1px;}
  .section-title:first-child{ margin-top:0; }

  .toast{
    position:fixed; bottom:76px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--coffee); color:#fff; padding:11px 22px; border-radius:999px; font-size:13.5px;
    font-weight:600; z-index:60; opacity:0; pointer-events:none; transition:all .25s ease;
    box-shadow:0 8px 20px rgba(0,0,0,0.25);
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .loading-screen{
    position:fixed; inset:0; background:var(--cream); z-index:100;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
  }
  .loading-screen .spinner{
    width:38px; height:38px; border:4px solid rgba(232,103,43,0.2); border-top-color:var(--orange);
    border-radius:50%; animation:spin .8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .loading-screen span{ color:var(--muted); font-weight:600; font-size:13.5px; }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }

  .empty-admin-hint{ text-align:center; color:var(--muted); font-size:13px; padding:20px 10px; }
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <span>ምናሌ በመጫን ላይ... / Loading menu...</span>
</div>

<div class="bg-rings" id="bgRings"></div>

<header class="top">
  <svg class="steam" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="white"/></svg>
  <div class="header-inner">
    <svg class="jebena" viewBox="0 0 64 64" fill="none">
      <ellipse cx="32" cy="54" rx="16" ry="6" fill="#fff" opacity="0.25"/>
      <path d="M20 30c0-9 5-16 12-16s12 7 12 16v12c0 6-5 11-12 11s-12-5-12-11V30z" fill="#fff" opacity="0.9"/>
      <path d="M44 26c6 1 9 5 9 9s-4 7-8 7" stroke="#fff" stroke-width="2.5" fill="none" opacity="0.85" stroke-linecap="round"/>
      <rect x="29" y="8" width="6" height="10" rx="2" fill="#fff" opacity="0.9"/>
      <circle cx="32" cy="6" r="3" fill="#fff" opacity="0.9"/>
      <path d="M17 26c-2-6 0-12 4-15" stroke="#fff" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>
    </svg>
    <div class="brand-text">
      <h1 class="brand-font">Saba Coffee ‑ ሳባ ቡና<span class="sub-en">Restaurant &amp; Coffee House</span></h1>
      <p class="tagline">የምግብ ዝርዝር — ይመልከቱ እና ይምረጡ</p>
    </div>
  </div>
</header>

<div class="cat-nav-wrap">
  <nav class="cat-nav" id="catNav"></nav>
</div>

<main>
  <div class="cat-heading" id="catHeading"></div>
  <div class="grid" id="itemGrid"></div>
</main>

<footer>
  <div class="foot-brand brand-font"ሳባ ቡና</div>
  <div class="foot-sub">SABA COFFEE · ADDIS ABABA</div>
</footer>

<button class="cart-fab is-empty" id="cartFab" title="Cart / ጋሪ">
  🛒<span class="cart-total" id="cartFabTotal"></span>
  <span class="cart-badge" id="cartBadge" style="display:none;">0</span>
</button>
<button class="admin-fab" id="adminFab" title="Admin">🔒</button>

<div id="modalRoot"></div>
<div id="cartModalRoot"></div>
<div class="toast" id="toast"></div>

<script>
/* ============================ DATA ============================ */
// The menu itself lives in the Python backend (SQLite via Flask, see app.py).
// This page talks to it through two endpoints:
//   GET  /api/menu           -> public, returns { categories, items }
//   POST /api/menu           -> admin only, requires header X-Admin-Pin
//   POST /api/admin/verify   -> checks a PIN, used for the login screen

function uid(prefix){ return prefix + '-' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

let state = null;
let activeCategory = null;
let isAuthenticated = false;
let adminTab = 'categories';
let adminPin = '';   // kept only in memory for this browser session, never stored

/* ============================ STORAGE (Flask API) ============================ */
async function loadData(){
  try{
    const res = await fetch('/api/menu');
    if(!res.ok) throw new Error('GET /api/menu failed: ' + res.status);
    state = await res.json();
  }catch(e){
    console.error('Load error', e);
    state = { categories: [], items: [] };
    showToast('⚠️ Could not reach the server / ሰርቨሩ ላይ መድረስ አልተቻለም');
  }
  activeCategory = state.categories[0] ? state.categories[0].id : null;
}

async function saveData(showToastMsg){
  try{
    const res = await fetch('/api/menu', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Pin': adminPin },
      body: JSON.stringify(state)
    });
    if(res.status === 401){
      isAuthenticated = false;
      if(showToastMsg !== false){ showToast('ፒን ትክክል አይደለም / Not authorized — please log in again'); }
      renderAdminModal();
      return false;
    }
    if(!res.ok) throw new Error('POST /api/menu failed: ' + res.status);
    if(showToastMsg !== false){ showToast('ተቀምጧል ✓ Saved'); }
    return true;
  }catch(e){
    console.error('Save error', e);
    if(showToastMsg !== false){ showToast('ማስቀመጥ አልተሳካም / Save failed'); }
    return false;
  }
}

/* ============================ RENDER: PUBLIC MENU ============================ */
function renderBgRings(){
  const wrap = document.getElementById('bgRings');
  const rings = [

function renderMenu(){

    const actions = it.available === false ? '' : `<div class="item-actions">${renderItemCartControl(it.id)}</div>`;

function escapeHtml(str){
  if(str===undefined || str===null) return '';
  return String(str).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function renderAll(){
  renderCatNav();

}

/* ============================ CART / ORDERS ============================ */
// cart: { [itemId]: qty }  -- kept only in memory on the visitor's device
let cart = {};

function renderItemCartControl(itemId){
  const qty = cart[itemId] || 0;
  if(qty === 0){
    return `<button class="add-cart-btn" onclick="addToCart('${itemId}')">➕ ጨምር / Add</button>`;
  }
  return `<div class="qty-stepper">
    <button onclick="changeQty('${itemId}', -1)">−</button>
    <span>${qty}</span>
    <button onclick="changeQty('${itemId}', 1)">+</button>
  </div>`;
}

function addToCart(itemId){
  cart[itemId] = (cart[itemId] || 0) + 1;
  renderMenu();
  renderCartFab();
  showToast('ወደ ጋሪ ታክሏል ✓ Added to cart');
}
window.addToCart = addToCart;

function changeQty(itemId, delta){
  const next = (cart[itemId] || 0) + delta;
  if(next <= 0){ delete cart[itemId]; } else { cart[itemId] = next; }
  renderMenu();
  renderCartFab();
  if(document.getElementById('cartModalRoot').innerHTML.trim() !== ''){
    renderCartModal();
  }
}
window.changeQty = changeQty;

function cartEntries(){
  return Object.keys(cart).map(id=>{
    const item = state.items.find(i=>i.id===id);
    if(!item) return null;
    return { item, qty: cart[id] };
  }).filter(Boolean);
}

function cartCount(){
  return Object.values(cart).reduce((sum,q)=>sum+q, 0);
}

function cartTotal(){
  return cartEntries().reduce((sum,e)=> sum + (Number(e.item.price)||0) * e.qty, 0);
}

function renderCartFab(){
  const fab = document.getElementById('cartFab');
  const badge = document.getElementById('cartBadge');
  const totalEl = document.getElementById('cartFabTotal');
  const count = cartCount();
  if(count === 0){
    fab.classList.add('is-empty');
    badge.style.display = 'none';
    totalEl.textContent = '';
    return;
  }
  fab.classList.remove('is-empty');
  badge.style.display = 'flex';
  badge.textContent = count;
  totalEl.textContent = cartTotal().toLocaleString() + ' ብር';
}

const cartModalRoot = document.getElementById('cartModalRoot');

function openCart(){
  renderCartModal();
}
document.getElementById('cartFab').addEventListener('click', openCart);

function closeCart(){
  cartModalRoot.innerHTML = '';
}
window.closeCart = closeCart;

  const lines = entries.map(e=>`

      </div>
    </div>
  `).join('');

  cartModalRoot.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) closeCart()">
      <div class="modal">
        <div class="modal-head">
          <h3>ጋሪዎ / Your cart</h3>
          <button class="icon-btn" onclick="closeCart()">✕</button>
        </div>

          ${lines}
          <div class="cart-summary">

          <button class="btn btn-primary btn-block" onclick="renderCheckoutForm()">ትዕዛዝ ይቀጥሉ / Continue to order</button>

              </div>

          <button class="btn btn-primary btn-block" onclick="submitOrder()">✅ ትዕዛዝ አረጋግጥ / Confirm order</button>
        </div>
      </div>
    </div>`;

async function submitOrder(){
  const nameEl = document.getElementById('orderName');
  const phoneEl = document.getElementById('orderPhone');
  const errEl = document.getElementById('orderError');
  const name = nameEl.value.trim();
  const phone = phoneEl.value.trim();

  if(!name){ errEl.textContent = 'እባክዎ ስም ያስገቡ / Please enter your name'; nameEl.focus(); return; }
  if(!phone){ errEl.textContent = 'እባክዎ ስልክ ቁጥር ያስገቡ / Please enter a phone number'; phoneEl.focus(); return; }

  const entries = cartEntries();
  const items = entries.map(e=>({
    id: e.item.id, name: e.item.name, nameEn: e.item.nameEn || '', price: e.item.price, qty: e.qty
  }));
  const total = cartTotal();

  errEl.textContent = '';
  try{
    const res = await fetch('/api/orders', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, phone, items, total })
    });
    if(!res.ok){
      const data = await res.json().catch(()=>({}));
      throw new Error(data.error || ('POST /api/orders failed: ' + res.status));
    }
    cart = {};
    renderMenu();
    renderCartFab();
    renderOrderSuccess(name);
  }catch(e){
    console.error('Order submit error', e);
    errEl.textContent = 'ትዕዛዝ መላክ አልተሳካም / Could not submit order — please try again';
  }
}
window.submitOrder = submitOrder;

  cartModalRoot.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) closeCart()">
      <div class="modal">
        <div class="modal-head">
          <h3>ትዕዛዝ ተልኳል / Order sent</h3>
          <button class="icon-btn" onclick="closeCart()">✕</button>

            <p>ትዕዛዝዎ ደርሶናል፣ በቅርቡ እናዘጋጃለን።</p>
            <p>Thank you! Your order has been received and we'll get started on it shortly.</p>
            <button class="btn btn-primary btn-block" style="margin-top:16px;" onclick="closeCart()">ዝጋ / Close</button>
          </div>
        </div>

}

              <p>ምናሌውን ለማስተካከል የ4 አሃዝ ፒን ያስገቡ<br>Enter the 4-digit admin PIN to edit the menu</p>

            <div class="admin-tab ${adminTab==='orders'?'active':''}" onclick="switchAdminTab('orders')">ትዕዛዞች / Orders</div>

async function checkPin(){
  const val = document.getElementById('pinInput').value;
  const errEl = document.getElementById('pinError');
  errEl.textContent = '';
  try{
    const res = await fetch('/api/admin/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin: val })
    });
    const data = await res.json();
    if(data && data.ok){
      adminPin = val;
      isAuthenticated = true;
      renderAdminModal();
    } else {
      errEl.textContent = 'ትክክል ያልሆነ ፒን / Incorrect PIN';
    }
  }catch(e){
    console.error('PIN check error', e);
    errEl.textContent = 'ሰርቨሩ ላይ መድረስ አልተቻለም / Could not reach server';
  }
}
window.checkPin = checkPin;

function switchAdminTab(tab){
  adminTab = tab;
  renderAdminModal();
}
window.switchAdminTab = switchAdminTab;

function renderAdminContent(){
  const el = document.getElementById('adminContent');
  if(adminTab === 'categories'){
    el.innerHTML = renderAdminCategories();
  } else if(adminTab === 'items'){
    el.innerHTML = renderAdminItems();
  } else {
    el.innerHTML = `<div class="empty-admin-hint">ትዕዛዞች በመጫን ላይ... / Loading orders...</div>`;
    loadOrders();
  }
}

function renameCategory(id, newName){
  const cat = state.categories.find(c=>c.id===id);
  if(!cat) return;
  if(!newName.trim()){ showToast('ስም ባዶ መሆን አይችልም'); renderAdminContent(); return; }
  cat.name = newName.trim();
  saveData();
  renderAll();
  renderAdminContent();
}
window.renameCategory = renameCategory;

function deleteCategory(id){
  const itemCount = state.items.filter(i=>i.categoryId===id).length;
  const msg = itemCount > 0
    ? `ይህ ምድብ ${itemCount} ምግቦችን ይዟል። ምድቡን ማጥፋት እነዚህንም ምግቦች ያጠፋል። እርግጠኛ ነዎት?`
    : 'ይህን ምድብ ማጥፋት ይፈልጋሉ?';
  if(!confirm(msg)) return;
  state.categories = state.categories.filter(c=>c.id!==id);
  state.items = state.items.filter(i=>i.categoryId!==id);
  if(activeCategory === id){
    activeCategory = state.categories[0] ? state.categories[0].id : null;
  }
  saveData();
  renderAll();
  renderAdminContent();
}
window.deleteCategory = deleteCategory;

function addCategory(){
  const input = document.getElementById('newCatName');
  const name = input.value.trim();
  if(!name){ showToast('እባክዎ ስም ያስገቡ'); return; }
  const newCat = { id: uid('cat'), name };
  state.categories.push(newCat);
  if(!activeCategory) activeCategory = newCat.id;
  saveData();
  renderAll();
  renderAdminContent();
}
window.addCategory = addCategory;

          <label class="field-label">ስም (አማርኛ)</label>
          <input type="text" id="newItemName" placeholder="ለምሳሌ፡ ዶሮ ወጥ">
        </div>
        <div class="field-group">
          <label class="field-label">Name (English)</label>
          <input type="text" id="newItemNameEn" placeholder="e.g. Doro Wet">
        </div>
      </div>
      <div class="field-row">
        <div class="field-group" style="max-width:110px;">
          <label class="field-label">ዋጋ / Price</label>
          <input type="number" min="0" id="newItemPrice" placeholder="0">
        </div>
        <div class="field-group" style="max-width:80px;">
          <label class="field-label">Icon</label>
          <input type="text" id="newItemIcon" placeholder="🍽️">
        </div>
        <div class="field-group">
          <label class="field-label">ምድብ / Category</label>
          <select id="newItemCategory">
            ${state.categories.map(c=>`<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field-group">
          <label class="field-label">መግለጫ / Description (optional)</label>
          <input type="text" id="newItemDesc" placeholder="">
        </div>
      </div>
      <button class="btn btn-primary btn-block" onclick="addItem()">➕ ምግብ ጨምር / Add item</button>
    </div>`;
}

function updateItem(id, field, value){
  const item = state.items.find(i=>i.id===id);
  if(!item) return;
  if(field === 'price'){
    const num = parseFloat(value);
    item.price = isNaN(num) ? 0 : num;
  } else if(field === 'available'){
    item.available = !!value;
  } else {
    item[field] = value;
  }
  saveData();
  renderAll();
  renderAdminContent();
}
window.updateItem = updateItem;

function deleteItem(id){
  if(!confirm('ይህን ምግብ ማጥፋት ይፈልጋሉ?')) return;
  state.items = state.items.filter(i=>i.id!==id);
  saveData();
  renderAll();
  renderAdminContent();
}
window.deleteItem = deleteItem;

function addItem(){
  const name = document.getElementById('newItemName').value.trim();
  const nameEn = document.getElementById('newItemNameEn').value.trim();
  const price = parseFloat(document.getElementById('newItemPrice').value) || 0;
  const icon = document.getElementById('newItemIcon').value.trim() || '🍽️';
  const categoryId = document.getElementById('newItemCategory').value;
  const desc = document.getElementById('newItemDesc').value.trim();

  if(!name){ showToast('እባክዎ የምግብ ስም ያስገቡ'); return; }
  if(!categoryId){ showToast('እባክዎ ምድብ ይምረጡ'); return; }

  state.items.push({ id: uid('i'), categoryId, name, nameEn, price, desc, icon, available:true });
  saveData();
  renderAll();
  renderAdminContent();
}
window.addItem = addItem;

/* ---- orders admin ---- */
function formatOrderTime(iso){
  try{
    const d = new Date(iso);
    return d.toLocaleString('en-GB', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
  }catch(e){ return iso || ''; }
}

async function loadOrders(){
  try{
    const res = await fetch('/api/orders', { headers: { 'X-Admin-Pin': adminPin } });
    if(res.status === 401){
      isAuthenticated = false;
      showToast('ፒን ትክክል አይደለም / Not authorized — please log in again');
      renderAdminModal();
      return;
    }
    if(!res.ok) throw new Error('GET /api/orders failed: ' + res.status);
    const orders = await res.json();
    renderOrdersList(orders);
  }catch(e){
    console.error('Load orders error', e);
    const el = document.getElementById('adminContent');
    if(el) el.innerHTML = `<div class="empty-admin-hint">⚠️ ትዕዛዞችን መጫን አልተቻለም / Could not load orders</div>`;
  }
}

function renderOrdersList(orders){
  const el = document.getElementById('adminContent');
  if(!el || adminTab !== 'orders') return;

  if(!orders || orders.length === 0){
    el.innerHTML = `<div class="empty-admin-hint">እስካሁን ምንም ትዕዛዝ የለም / No orders yet</div>`;
    return;
  }

  el.innerHTML = orders.map(o=>{
    const doneCls = o.status === 'done' ? 'is-done' : '';
    const pillCls = o.status === 'done' ? 'done' : '';
    const pillText = o.status === 'done' ? 'ተጠናቋል / Done' : 'አዲስ / New';
    const itemsLine = (o.items || []).map(it=>`${escapeHtml(it.name)} ×${it.qty}`).join(', ');
    return `<div class="order-card ${doneCls}">
      <div class="order-card-head">
        <div>
          <div class="order-card-name">${escapeHtml(o.name)}</div>
          <div class="order-card-phone">📞 ${escapeHtml(o.phone)}</div>
        </div>
        <div style="text-align:right;">
          <div class="order-status-pill ${pillCls}">${pillText}</div>
          <div class="order-card-time">${formatOrderTime(o.createdAt)}</div>
        </div>
      </div>
      <div class="order-card-items">${itemsLine}</div>
      <div class="order-card-foot">
        <div class="order-card-total">${Number(o.total).toLocaleString()} ብር</div>
        <div class="order-card-actions">
          ${o.status === 'done'
            ? `<button class="btn btn-outline btn-sm" onclick="setOrderStatus(${o.id}, 'new')">↺ አዲስ አድርግ</button>`
            : `<button class="btn btn-primary btn-sm" onclick="setOrderStatus(${o.id}, 'done')">✓ ተጠናቋል</button>`}
          <button class="btn btn-danger btn-sm" onclick="deleteOrder(${o.id})">አጥፋ</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function setOrderStatus(orderId, status){
  try{
    const res = await fetch('/api/orders/' + orderId, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Pin': adminPin },
      body: JSON.stringify({ status })
    });
    if(res.status === 401){
      isAuthenticated = false;
      showToast('ፒን ትክክል አይደለም / Not authorized');
      renderAdminModal();
      return;
    }
    if(!res.ok) throw new Error('PATCH order failed: ' + res.status);
    loadOrders();
  }catch(e){
    console.error('Update order error', e);
    showToast('ማዘመን አልተሳካም / Update failed');
  }
}
window.setOrderStatus = setOrderStatus;

async function deleteOrder(orderId){
  if(!confirm('ይህን ትዕዛዝ ማጥፋት ይፈልጋሉ?')) return;
  try{
    const res = await fetch('/api/orders/' + orderId, {
      method: 'DELETE',
      headers: { 'X-Admin-Pin': adminPin }
    });
    if(res.status === 401){
      isAuthenticated = false;
      showToast('ፒን ትክክል አይደለም / Not authorized');
      renderAdminModal();
      return;
    }
    if(!res.ok) throw new Error('DELETE order failed: ' + res.status);
    loadOrders();
  }catch(e){
    console.error('Delete order error', e);
    showToast('ማጥፋት አልተሳካም / Delete failed');
  }
}
window.deleteOrder = deleteOrder;

/* ============================ INIT ============================ */
async function init(){
  renderBgRings();
  await loadData();
  renderAll();
  renderCartFab();
  document.getElementById('loadingScreen').style.display = 'none';
}
init();
</script>
